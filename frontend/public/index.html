<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/icon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#5A4FF7" />
    <meta name="description" content="Kiness — Keeping Families Connected. Updates from your loved one's care home." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kiness" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon.svg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet" />
    <title>Kiness — Your family, always close.</title>
    <script>
      (function () {
        var KEY = 'kinness_build_id';
        fetch('/build-id.json?_=' + Date.now(), { cache: 'no-store' })
          .then(function (res) {
            return res.ok ? res.json() : null;
          })
          .then(function (data) {
            if (!data || !data.buildId) return;
            var prev = localStorage.getItem(KEY);
            if (prev && prev !== data.buildId) {
              localStorage.setItem(KEY, data.buildId);
              var reload = function () {
                location.reload();
              };
              if (!('serviceWorker' in navigator)) {
                reload();
                return;
              }
              navigator.serviceWorker
                .getRegistrations()
                .then(function (regs) {
                  return Promise.all(regs.map(function (r) {
                    return r.unregister();
                  }));
                })
                .then(function () {
                  if ('caches' in window) {
                    return caches.keys().then(function (keys) {
                      return Promise.all(
                        keys.map(function (k) {
                          return caches.delete(k);
                        })
                      );
                    });
                  }
                })
                .then(reload)
                .catch(reload);
            } else if (!prev) {
              localStorage.setItem(KEY, data.buildId);
            }
          })
          .catch(function () {});
      })();
    </script>
  </head>
  <body>
    <noscript>Kiness needs JavaScript enabled to run.</noscript>
    <div id="root"></div>
  </body>
</html>
