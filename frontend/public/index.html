<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/icon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#5A4FF7" />
    <meta name="description" content="Kiness — Keeping Families Connected. Updates from your loved one's care home." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kiness" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet" />
    <title>Kiness — Your family, always close.</title>
    <script>
      (function () {
        var KEY = 'kinness_build_id';
        fetch('/build-id.json?_=' + Date.now(), { cache: 'no-store' })
          .then(function (res) {
            return res.ok ? res.json() : null;
          })
          .then(function (data) {
            if (!data || !data.buildId) return;
            var prev = localStorage.getItem(KEY);
            if (prev && prev !== data.buildId) {
              localStorage.setItem(KEY, data.buildId);
              var reload = function () {
                location.reload();
              };
              if (!('serviceWorker' in navigator)) {
                reload();
                return;
              }
              navigator.serviceWorker
                .getRegistrations()
                .then(function (regs) {
                  return Promise.all(regs.map(function (r) {
                    return r.unregister();
                  }));
                })
                .then(function () {
                  if ('caches' in window) {
                    return caches.keys().then(function (keys) {
                      return Promise.all(
                        keys.map(function (k) {
                          return caches.delete(k);
                        })
                      );
                    });
                  }
                })
                .then(reload)
                .catch(reload);
            } else if (!prev) {
              localStorage.setItem(KEY, data.buildId);
            }
          })
          .catch(function () {});
      })();
    </script>
  </head>
  <body>
    <div
      id="kinness-splash"
      style="
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F0EFFB;
      "
    >
      <svg viewBox="0 0 160 40" width="192" height="48" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Kiness">
        <path d="M8 20 C8 16, 12 13, 16 17 C20 13, 24 16, 24 20 C24 25, 16 30, 16 30 C16 30, 8 25, 8 20 Z" fill="#5B4FE8" opacity="0.15"/>
        <path d="M10 20 C10 17, 13 15, 16 18 C19 15, 22 17, 22 20 C22 24, 16 28, 16 28 C16 28, 10 24, 10 20 Z" fill="#5B4FE8"/>
        <text x="30" y="27" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" letter-spacing="0.5" fill="#3C3489">Kiness</text>
      </svg>
    </div>
    <noscript>Kiness needs JavaScript enabled to run.</noscript>
    <div id="root"></div>
    <script>
      (function () {
        var splash = document.getElementById('kinness-splash');
        function hideSplash() {
          if (splash) splash.style.display = 'none';
        }
        window.addEventListener('load', hideSplash);
        setTimeout(hideSplash, 3000);
      })();
    </script>
  </body>
</html>
